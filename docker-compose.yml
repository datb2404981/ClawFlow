# Compose đọc biến từ `.env` ở thư mục gốc (chỉ để nội suy ${JWT_SECRET}…), nhưng
# MONGO_URI lấy từ Backend/.env qua env_file — trùng với khi bạn chạy Nest local + Atlas.
#
# Mongo trong Docker (tùy chọn): docker compose --profile local-db up -d mongodb
# rồi trong Backend/.env đặt: MONGO_URI=mongodb://mongodb:27017/clawflow
#
# Code từ máy → container (sửa file là thấy, giống nhau cho cả ba):
#   • backend:  mount ./Backend; `backend_node_modules` (named volume) ghi đè /app/node_modules
#              — tránh dùng node_modules từ host. Sau khi thêm dependency: `docker compose run --rm
#              backend npm install` hoặc `docker volume rm <project>_backend_node_modules` rồi up lại.
#   • ai_core:  mount ./AI_Core + uvicorn `reload=True` trong main.py
#   • frontend: mount ./Frontend + named volume `frontend_node_modules_v2` (giống backend).
#     Nếu Vite báo thiếu gói (vd. socket.io-client): `docker compose down` rồi
#     `docker volume rm <project>_frontend_node_modules_v2` và `docker compose up frontend`,
#     hoặc chỉ cần pull compose mới (đổi tên volume = node_modules được tạo lại).
# Image prod chỉ build (dist trong image), không mount: dùng `DockerFile` + `npm run start:prod` — tách file compose riêng hoặc `docker build -f Backend/DockerFile` khi deploy.
# Ollama trên host (mặc định cổng 11434): AI_Core dùng OLLAMA_BASE_URL dưới đây; chạy Python trên host
# thì 127.0.0.1:11434 ổn, không cần set thêm.
# Backend trong Docker: AI_CORE_BASE_URL phải là tên service (ai_core), không dùng 127.0.0.1.
# AI_Core load graph + Mongo: MONGO_URI trong Backend/.env phải tới được từ container (Atlas + IP allow,
# hoặc `mongodb://mongodb:27017/...` khi chạy `docker compose --profile local-db up -d mongodb`).

services:
  mongodb:
    profiles:
      - local-db
    image: mongo:latest
    container_name: openclaw_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - openclaw_network

  redis:
    image: redis:alpine
    container_name: clawflow_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - openclaw_network

  backend:
    build:
      context: ./Backend
      dockerfile: DockerFile.dev
    image: openclaw-backend-dev
    container_name: openclaw_backend_dev
    ports:
      - '8080:8080'
    env_file:
      - ./Backend/.env
    environment:
      JWT_SECRET: ${JWT_SECRET:-clawflow-docker-dev-only-change-me}
      AI_CORE_BASE_URL: http://ai_core:8000
      # BullMQ: trong mạng compose dùng hostname `redis`, không dùng 127.0.0.1
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    command: sh -c "npm install && npm run start:dev"
    depends_on:
      - redis
      - ai_core
    networks:
      - openclaw_network

  ai_core:
    build:
      context: ./AI_Core
      dockerfile: DockerFile
    container_name: openclaw_ai
    ports:
      - '8000:8000'
    env_file:
      - ./Backend/.env
    environment:
      # Backend/.env thường có PORT=8080 (Nest). AI_Core dùng cùng file → ghi đè, không dùng 8080
      # trong container này; map compose là 8000:8000 và backend gọi http://ai_core:8000
      PORT: '8000'
      # Uvicorn dùng watchfiles; trên bind-mount (macOS/Windows) polling ổn định hơn
      WATCHFILES_FORCE_POLLING: 'true'
      # Gọi Ollama cài trên macOS/Windows (ngoài container)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # LangSmith: subprocess `reload` đôi khi làm mất/ lệch trace — tắt reload trong Docker (bật lại = xóa dòng này).
      UVICORN_RELOAD: "true"
    volumes:
      - ./AI_Core:/app
    networks:
      - openclaw_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: DockerFile
    container_name: openclaw_frontend
    ports:
      - '5173:5173'
    environment:
      # Trong mạng compose, Vite proxy gọi backend qua service name
      VITE_BACKEND_HOST: backend
      VITE_BACKEND_PORT: '8080'
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ./Frontend:/app
      - frontend_node_modules_v2:/app/node_modules
    # Luôn cài theo package-lock trên host (bind mount) — volume named tránh “stuck” khó xóa như anonymous.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    networks:
      - openclaw_network

networks:
  openclaw_network:
    driver: bridge

volumes:
  mongo_data:
  backend_node_modules:
  backend_dist:
  frontend_node_modules_v2:
  redis_data:
